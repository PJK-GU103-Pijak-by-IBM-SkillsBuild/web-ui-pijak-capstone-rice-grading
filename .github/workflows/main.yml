name: CI/CD Frontend Rice Grading

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Vite
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}  # kalau ada env variable

      - name: Deploy dist ke server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/pijak-capstone-rice-grading/web"  # path di server kamu
          strip_components: 1
